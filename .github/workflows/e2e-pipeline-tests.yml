name: End-to-End Pipeline Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  e2e-pipeline-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, "3.10", "3.11"]
        test-suite: [
          "data-pipeline",
          "training-pipeline", 
          "inference-pipeline",
          "evaluation-pipeline",
          "integration-workflows"
        ]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
        pip install pytest-xdist pytest-cov pytest-benchmark pytest-timeout

    - name: Create test directories
      run: |
        mkdir -p data/train/classless
        mkdir -p data/val/classless
        mkdir -p checkpoints
        mkdir -p outputs

    - name: Run Data Pipeline Tests
      if: matrix.test-suite == 'data-pipeline'
      run: |
        pytest tests/test_e2e_pipeline.py::TestDataPipeline \
          -v --tb=short --timeout=300 \
          --cov=pkl_dg --cov-report=xml

    - name: Run Training Pipeline Tests
      if: matrix.test-suite == 'training-pipeline'
      run: |
        pytest tests/test_e2e_pipeline.py::TestTrainingPipeline \
          -v --tb=short --timeout=600 \
          --cov=pkl_dg --cov-append --cov-report=xml

    - name: Run Inference Pipeline Tests
      if: matrix.test-suite == 'inference-pipeline'
      run: |
        pytest tests/test_e2e_pipeline.py::TestInferencePipeline \
          -v --tb=short --timeout=600 \
          --cov=pkl_dg --cov-append --cov-report=xml

    - name: Run Evaluation Pipeline Tests
      if: matrix.test-suite == 'evaluation-pipeline'
      run: |
        pytest tests/test_e2e_pipeline.py::TestEvaluationPipeline \
          -v --tb=short --timeout=300 \
          --cov=pkl_dg --cov-append --cov-report=xml

    - name: Run Integration Workflow Tests
      if: matrix.test-suite == 'integration-workflows'
      run: |
        pytest tests/test_e2e_pipeline.py::TestIntegrationWorkflows \
          -v --tb=short --timeout=900 \
          --cov=pkl_dg --cov-append --cov-report=xml

    - name: Upload coverage to Codecov
      if: success()
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: e2e-${{ matrix.test-suite }}
        name: codecov-${{ matrix.python-version }}-${{ matrix.test-suite }}

  performance-benchmarks:
    runs-on: ubuntu-latest
    needs: e2e-pipeline-tests
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[benchmark]')

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
        pip install pytest-benchmark psutil

    - name: Run Performance Benchmarks
      run: |
        pytest tests/test_e2e_performance_profiling.py \
          -v --tb=short --timeout=1800 \
          --benchmark-only --benchmark-json=benchmark_results.json

    - name: Store benchmark results
      uses: benchmark-action/github-action-benchmark@v1
      if: success()
      with:
        name: PKL Diffusion E2E Benchmarks
        tool: 'pytest'
        output-file-path: benchmark_results.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
        alert-threshold: '150%'
        comment-on-alert: true
        fail-on-alert: true

  gpu-tests:
    runs-on: [self-hosted, gpu]  # Requires self-hosted runner with GPU
    if: contains(github.event.head_commit.message, '[gpu-test]')
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
        pip install pytest-xdist pytest-timeout

    - name: Check GPU availability
      run: |
        python -c "import torch; print(f'CUDA available: {torch.cuda.is_available()}')"
        python -c "import torch; print(f'GPU count: {torch.cuda.device_count()}')" 

    - name: Run GPU-specific tests
      run: |
        pytest tests/test_e2e_performance_profiling.py::TestPerformanceProfiling::test_gpu_performance_comparison \
          -v --tb=short --timeout=1200

  memory-stress-tests:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[stress-test]')

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
        pip install pytest-timeout psutil

    - name: Run Memory Stress Tests
      run: |
        pytest tests/test_e2e_performance_profiling.py::TestPerformanceProfiling::test_memory_leak_detection \
          tests/test_e2e_performance_profiling.py::TestPerformanceProfiling::test_inference_memory_scaling \
          -v --tb=short --timeout=1800

  integration-report:
    runs-on: ubuntu-latest
    needs: [e2e-pipeline-tests, performance-benchmarks]
    if: always()

    steps:
    - name: Generate Test Report
      run: |
        echo "# End-to-End Pipeline Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Test Status" >> $GITHUB_STEP_SUMMARY
        echo "- E2E Pipeline Tests: ${{ needs.e2e-pipeline-tests.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Performance Benchmarks: ${{ needs.performance-benchmarks.result }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
        echo "Coverage reports are available in the Codecov integration." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Performance Metrics" >> $GITHUB_STEP_SUMMARY
        echo "Benchmark results are tracked in the GitHub Actions benchmark tool." >> $GITHUB_STEP_SUMMARY
