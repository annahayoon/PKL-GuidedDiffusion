defaults:
  - model: unet
  - data: synthesis
  - physics: microscopy
  - guidance: pkl
  - inference: default
  - training: ddpm_colab
  - override hydra/launcher: basic
  - _self_

experiment:
  name: colab_experiment
  seed: 42
  device: cuda
  mixed_precision: true
  enable_memory_profiling: false  # Disable to save memory

paths:
  root: ${oc.env:PROJECT_ROOT,/content/PKL-DiffusionDenoising}
  data: ${paths.root}/data
  checkpoints: ${paths.root}/checkpoints
  outputs: ${paths.root}/outputs
  logs: ${paths.root}/logs

wandb:
  project: pkl-diffusion-colab
  entity: null
  mode: online

# Colab-specific settings
colab:
  # Prevent browser disconnection crashes
  prevent_disconnect: true
  # Auto-save checkpoints every N minutes
  checkpoint_interval_minutes: 15
  # Enable automatic resuming from last checkpoint
  auto_resume: true
  # Save to Google Drive for persistence
  save_to_drive: true
  drive_path: /content/drive/MyDrive/PKL-DiffusionDenoising
